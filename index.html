<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>SoulEcho</title>
<link rel="manifest" href="/manifest.json">
<meta name="theme-color" content="#0f0a1e">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="SoulEcho">
<link rel="apple-touch-icon" href="/icon-192.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@300;400&display=swap" rel="stylesheet">
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
html,body{height:100%;background:#0f0a1e;font-family:'Noto Sans TC','PingFang TC',sans-serif;color:rgba(255,255,255,0.85);overflow:hidden;}
#star-canvas{position:fixed;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:0;}
#top-bar{position:fixed;top:0;left:0;right:0;z-index:50;display:flex;align-items:center;justify-content:space-between;padding:18px 22px 10px;background:linear-gradient(to bottom,rgba(15,10,30,0.97) 55%,transparent);}
.logo{font-size:12px;font-weight:300;letter-spacing:5px;color:rgba(255,255,255,0.18);}
#online-count{display:flex;align-items:center;gap:7px;font-size:11px;font-weight:300;color:rgba(255,255,255,0.18);letter-spacing:0.5px;}
.live-dot{width:5px;height:5px;border-radius:50%;background:#b8a4f0;animation:pulse 2.5s ease-in-out infinite;}
@keyframes pulse{0%,100%{opacity:0.3;transform:scale(1)}50%{opacity:1;transform:scale(1.3)}}
#prompt-hint{position:fixed;top:56px;left:0;right:0;z-index:40;text-align:center;font-size:12px;font-weight:300;color:rgba(255,255,255,0.18);letter-spacing:1.2px;pointer-events:none;}
#feed{position:fixed;top:74px;bottom:160px;left:0;right:0;overflow-y:auto;overflow-x:hidden;padding:8px 16px 16px;z-index:10;}
#feed::-webkit-scrollbar{display:none;}
.fragment{background:rgba(255,255,255,0.04);border:0.5px solid rgba(180,160,255,0.13);border-radius:20px;padding:17px 18px 13px;margin-bottom:11px;position:relative;}opacity:1;
.fragment-text{font-size:14px;font-weight:300;line-height:1.85;color:rgba(255,255,255,0.85);letter-spacing:0.2px;white-space:pre-wrap;word-break:break-all;}
.fragment-footer{display:flex;align-items:center;justify-content:space-between;margin-top:13px;gap:8px;flex-wrap:wrap;}
.fragment-time{font-size:11px;font-weight:300;color:rgba(255,255,255,0.18);}
.fragment-actions{display:flex;gap:8px;align-items:center;flex-shrink:0;}
.rbtn{border:0.5px solid rgba(180,160,255,0.22);background:rgba(255,255,255,0.03);border-radius:20px;padding:6px 14px;font-size:12px;font-weight:300;color:rgba(255,255,255,0.5);cursor:pointer;font-family:'Noto Sans TC',sans-serif;white-space:nowrap;}
.rbtn:hover{background:rgba(180,160,255,0.1);border-color:rgba(180,160,255,0.45);color:rgba(255,255,255,0.85);}
.rbtn.done{background:rgba(180,160,255,0.12);border-color:rgba(180,160,255,0.5);color:rgba(255,255,255,0.8);pointer-events:none;}
.share-btn-sm{background:none;border:none;cursor:pointer;color:rgba(255,255,255,0.18);font-size:13px;padding:4px;}
.gdot{position:absolute;top:15px;right:16px;width:6px;height:6px;border-radius:50%;opacity:0;transition:opacity 1.2s;}
.gdot.on{opacity:1;}
#input-wrap{position:fixed;bottom:0;left:0;right:0;padding:10px 14px 16px;background:linear-gradient(to top,rgba(15,10,30,1) 70%,transparent);z-index:50;}
#quick-prompts{display:flex;gap:7px;overflow-x:auto;padding-bottom:10px;scrollbar-width:none;}
#quick-prompts::-webkit-scrollbar{display:none;}
.qp{background:rgba(255,255,255,0.04);border:0.5px solid rgba(180,160,255,0.13);border-radius:18px;padding:6px 12px;font-size:11px;font-weight:300;color:rgba(255,255,255,0.5);cursor:pointer;white-space:nowrap;font-family:'Noto Sans TC',sans-serif;flex-shrink:0;}
#input-box{background:rgba(255,255,255,0.045);border:0.5px solid rgba(180,160,255,0.13);border-radius:18px;padding:12px 14px 9px;}
#input-ta{width:100%;background:transparent;border:none;outline:none;font-size:14px;font-weight:300;color:rgba(255,255,255,0.85);font-family:'Noto Sans TC',sans-serif;resize:none;line-height:1.75;}
#input-ta::placeholder{color:rgba(255,255,255,0.22);}
#input-footer{display:flex;align-items:center;justify-content:space-between;margin-top:7px;}
#char-count{font-size:10px;font-weight:300;color:rgba(255,255,255,0.18);}
#release-btn{font-size:12px;font-weight:300;color:rgba(180,160,255,0.65);letter-spacing:1px;cursor:pointer;border:0.5px solid rgba(180,160,255,0.25);border-radius:12px;padding:5px 13px;background:none;font-family:'Noto Sans TC',sans-serif;}
#toast{position:fixed;bottom:230px;left:50%;transform:translateX(-50%) translateY(8px);background:rgba(20,14,40,0.95);border:0.5px solid rgba(180,160,255,0.25);border-radius:16px;padding:9px 20px;font-size:12px;font-weight:300;color:rgba(255,255,255,0.72);white-space:nowrap;opacity:0;pointer-events:none;z-index:9000;transition:opacity 0.35s,transform 0.35s;}
#toast.show{opacity:1;transform:translateX(-50%) translateY(0);}
#chat-overlay{position:fixed;inset:0;z-index:8000;background:rgba(8,5,18,0.88);display:flex;align-items:flex-end;justify-content:center;backdrop-filter:blur(6px);}
#chat-overlay.hidden{display:none;}
#chat-box{width:100%;max-width:480px;height:72vh;background:#13102a;border-radius:26px 26px 0 0;border-top:0.5px solid rgba(180,160,255,0.2);display:flex;flex-direction:column;}
#chat-top{padding:20px 20px 14px;border-bottom:0.5px solid rgba(180,160,255,0.1);display:flex;align-items:flex-start;justify-content:space-between;}
#chat-label{font-size:15px;font-weight:400;color:rgba(255,255,255,0.75);}
#chat-sub{font-size:11px;font-weight:300;color:rgba(255,255,255,0.18);margin-top:4px;}
#chat-close{background:rgba(255,255,255,0.06);border:0.5px solid rgba(255,255,255,0.12);border-radius:12px;color:rgba(255,255,255,0.45);font-size:12px;font-weight:300;padding:6px 14px;cursor:pointer;font-family:'Noto Sans TC',sans-serif;}
#chat-msgs{flex:1;overflow-y:auto;padding:16px;display:flex;flex-direction:column;gap:10px;}
#chat-msgs::-webkit-scrollbar{display:none;}
.cmsg{max-width:80%;padding:10px 14px;border-radius:18px;font-size:14px;font-weight:300;line-height:1.6;}
.cmsg.mine{background:rgba(180,160,255,0.18);border:0.5px solid rgba(180,160,255,0.3);color:rgba(255,255,255,0.9);align-self:flex-end;border-bottom-right-radius:5px;}
.cmsg.theirs{background:rgba(255,255,255,0.06);border:0.5px solid rgba(255,255,255,0.1);color:rgba(255,255,255,0.75);align-self:flex-start;border-bottom-left-radius:5px;}
.csys{text-align:center;font-size:11px;font-weight:300;color:rgba(255,255,255,0.18);padding:4px 0;}
#chat-input-row{padding:12px 16px 20px;display:flex;gap:10px;border-top:0.5px solid rgba(180,160,255,0.08);}
#chat-input{flex:1;background:rgba(255,255,255,0.05);border:0.5px solid rgba(180,160,255,0.2);border-radius:18px;padding:11px 16px;font-size:14px;font-weight:300;color:rgba(255,255,255,0.85);font-family:'Noto Sans TC',sans-serif;outline:none;}
#chat-send{width:42px;height:42px;background:rgba(180,160,255,0.2);border:0.5px solid rgba(180,160,255,0.4);border-radius:50%;color:rgba(255,255,255,0.8);font-size:16px;cursor:pointer;flex-shrink:0;display:flex;align-items:center;justify-content:center;}
#share-overlay{position:fixed;inset:0;z-index:9000;background:rgba(8,5,18,0.92);display:flex;align-items:center;justify-content:center;flex-direction:column;gap:16px;padding:20px;}
#share-overlay.hidden{display:none;}
#share-canvas{border-radius:20px;max-width:min(340px,85vw);box-shadow:0 20px 60px rgba(0,0,0,0.6);}
#share-actions{display:flex;gap:10px;flex-wrap:wrap;justify-content:center;}
.sbtn{padding:12px 20px;border-radius:14px;font-size:13px;font-weight:300;cursor:pointer;border:none;font-family:'Noto Sans TC',sans-serif;}
.sbtn.dl{background:rgba(255,255,255,0.9);color:#1a1030;}
.sbtn.ig{background:linear-gradient(135deg,#f09433,#dc2743,#bc1888);color:#fff;}
.sbtn.cl{background:rgba(255,255,255,0.1);color:rgba(255,255,255,0.6);}
.hidden{display:none!important;}
</style>
</head>
<body>
<canvas id="star-canvas"></canvas>
<div id="top-bar">
  <div class="logo">SOUL ECHO</div>
  <div id="online-count"><div class="live-dot"></div><span id="online-num">0</span> 個靈魂在這裡</div>
</div>
<div id="prompt-hint">說出來就好，不需要解釋</div>
<div id="feed"></div>
<div id="input-wrap">
  <div id="quick-prompts">
    <button class="qp" onclick="usePrompt(this)">有點累，說不出原因</button>
    <button class="qp" onclick="usePrompt(this)">腦袋停不下來</button>
    <button class="qp" onclick="usePrompt(this)">想說話，但不知道找誰</button>
    <button class="qp" onclick="usePrompt(this)">其實還好，只是想待一下</button>
  </div>
  <div id="input-box">
    <textarea id="input-ta" placeholder="或者用自己的話說..." maxlength="120" rows="2"></textarea>
    <div id="input-footer">
      <span id="char-count"></span>
      <button id="release-btn">放開 ↗</button>
    </div>
  </div>
</div>
<div id="chat-overlay" class="hidden">
  <div id="chat-box">
    <div id="chat-top">
      <div><div id="chat-label">匿名相遇</div><div id="chat-sub">這段對話只存在於此刻，離開即消失</div></div>
      <button id="chat-close">離開</button>
    </div>
    <div id="chat-msgs"></div>
    <div id="chat-input-row">
      <input id="chat-input" type="text" placeholder="說點什麼..." maxlength="200">
      <button id="chat-send">↑</button>
    </div>
  </div>
</div>
<div id="share-overlay" class="hidden">
  <canvas id="share-canvas" width="390" height="560"></canvas>
  <div id="share-actions">
    <button class="sbtn dl" id="dl-btn">儲存圖片</button>
    <button class="sbtn ig" id="ig-btn">分享到 IG 限動</button>
    <button class="sbtn cl" id="cl-btn">關閉</button>
  </div>
</div>
<div id="toast"></div>
<script defer src="/app.js"></script>
</body>
</html>
