<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>SoulEcho</title>
<link rel="manifest" href="/manifest.json">
<meta name="theme-color" content="#0f0a1e">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="SoulEcho">
<link rel="apple-touch-icon" href="/icon-192.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@300;400;500&display=swap" rel="stylesheet">
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>
<link rel="stylesheet" href="/style.css">
</head>
<body>

<canvas id="star-canvas"></canvas>

<div id="top-bar">
  <div class="logo">SOUL ECHO</div>
  <div id="online-count">
    <div class="live-dot"></div>
    <span id="online-num">0</span> 個靈魂在這裡
  </div>
</div>

<div id="feed"></div>
<div id="empty-state">
  <div class="empty-line1">宇宙很安靜</div>
  <div class="empty-line2">但你不是一個人</div>
</div>

<div id="input-wrap">
  <div id="input-box">
    <div id="input-ph">你現在的感覺是什麼</div>
    <textarea id="input-ta" maxlength="120" rows="2"></textarea>
    <div id="input-footer">
      <span id="char-count">0 / 120</span>
      <button id="release-btn">放開 ↗</button>
    </div>
  </div>
</div>
<div id="bottom-note">沒有帳號，沒有名字，只有此刻</div>

<!-- ANON CHAT -->
<div id="chat-overlay">
  <div id="chat-box">
    <div id="chat-top">
      <div>
        <div id="chat-label">匿名相遇</div>
        <div id="chat-sub">這段對話只存在於此刻，離開即消失</div>
      </div>
      <button id="chat-close">離開</button>
    </div>
    <div id="chat-msgs"></div>
    <div id="chat-input-row">
      <input id="chat-input" type="text" placeholder="說點什麼..." maxlength="200">
      <button id="chat-send">↑</button>
    </div>
  </div>
</div>

<!-- SHARE CARD -->
<div id="share-overlay">
  <div id="share-box">
    <canvas id="share-canvas" width="390" height="560"></canvas>
    <div id="share-actions">
      <button class="share-btn dl" id="dl-btn">儲存圖片</button>
      <button class="share-btn ig" id="ig-btn">分享到 IG 限動</button>
      <button class="share-btn cl" id="cl-btn">關閉</button>
    </div>
  </div>
</div>

<div id="toast"></div>

<script defer src="/app.js"></script>
</body>
</html>
